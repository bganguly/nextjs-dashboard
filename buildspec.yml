version: 0.2
phases:
  install:
    runtime-versions:
      nodejs: 22
  pre_build:
    commands:
      - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$ECR_REPO_URI"
      - npm install --prefer-offline || npm install
  build:
    commands:
      - docker build -t "$ECR_REPO_URI:latest" .
  post_build:
    commands:
      - docker push "$ECR_REPO_URI:latest"
      - npx tsx -e "import { runMigrations } from './lib/schema.ts'; runMigrations().then(() => process.exit(0)).catch(e => { console.error(e.message); process.exit(1); })" 2>/dev/null || node -e "const { runMigrations } = require('./lib/schema.js'); runMigrations().then(() => process.exit(0)).catch(e => { console.error(e); process.exit(1); })"
